# MiniStack Bedrock — Model mapping configuration
# Maps AWS Bedrock model IDs to local models served via Ollama/LiteLLM.
#
# Usage:
#   - Models listed here are exposed by list_inference_profiles()
#   - converse() maps the requested modelId to the local model before calling LiteLLM
#   - If a modelId is not found, "default_model" is used
#
# To install the required models:
#   docker exec ministack-ollama ollama pull qwen2.5:3b        # default (2 GB)
#   docker exec ministack-ollama ollama pull nomic-embed-text   # embeddings (274 MB)
#   docker exec ministack-ollama ollama pull qwen3.5:4b         # heavy — for Opus (2.6 GB)
#   docker exec ministack-ollama ollama pull qwen3.5:2b         # medium (1.5 GB)
#   docker exec ministack-ollama ollama pull qwen3.5:0.8b       # light — fast prototyping (530 MB)

models:
  # ── Anthropic Claude ──────────────────────────────────────────────────────
  #
  # Three tiers of local models to match Claude's capability levels:
  #   • Opus   → qwen3.5:4b   (heavy, best quality, ~2.6 GB)
  #   • Sonnet → qwen3.5:2b   (balanced quality/speed, ~1.5 GB)
  #   • Haiku  → qwen3.5:0.8b (light, fastest, ~530 MB — ideal for prototyping)
  #
  # If a model is not pulled in Ollama, inference falls back to default_model (qwen2.5:3b).

  # Opus — most capable, use qwen3.5:4b for best local approximation
  "anthropic.claude-opus-4-6-v1:0": "qwen3.5:4b"
  "anthropic.claude-opus-4-5-20251101-v1:0": "qwen3.5:4b"

  # Sonnet — balanced performance, use qwen3.5:2b
  "anthropic.claude-3-sonnet-20240229-v1:0": "qwen3.5:2b"
  "anthropic.claude-3-5-sonnet-20241022-v2:0": "qwen3.5:2b"
  "eu.anthropic.claude-sonnet-4-6": "qwen3.5:2b"
  "us.anthropic.claude-sonnet-4-6": "qwen3.5:2b"
  "eu.anthropic.claude-sonnet-4-20250514-v1:0": "qwen3.5:2b"
  "us.anthropic.claude-sonnet-4-20250514-v1:0": "qwen3.5:2b"

  # Haiku — lightest, use qwen3.5:0.8b for fast iteration and testing
  "anthropic.claude-3-haiku-20240307-v1:0": "qwen3.5:0.8b"

  # Legacy Claude v2
  "anthropic.claude-v2": "qwen2.5:3b"

  # ── Amazon Titan ──────────────────────────────────────────────────────────
  "amazon.titan-text-express-v1": "qwen2.5:3b"
  "amazon.titan-text-lite-v1": "qwen2.5:3b"
  "amazon.titan-embed-text-v1": "nomic-embed-text"
  "amazon.titan-embed-text-v2:0": "nomic-embed-text"

  # ── Meta Llama ────────────────────────────────────────────────────────────
  "meta.llama3-8b-instruct-v1:0": "qwen2.5:3b"
  "meta.llama3-70b-instruct-v1:0": "qwen2.5:3b"
  "meta.llama3-1-8b-instruct-v1:0": "qwen2.5:3b"

  # ── Mistral ───────────────────────────────────────────────────────────────
  "mistral.mistral-7b-instruct-v0:2": "qwen2.5:3b"
  "mistral.mixtral-8x7b-instruct-v0:1": "qwen2.5:3b"

# Embedding model used for Knowledge Base ingestion & retrieval
embedding_model: "nomic-embed-text"

# Default model when model ID is not in mapping (fallback)
default_model: "qwen2.5:3b"

# Guardrail configuration
guardrails:
  default_action: "NONE"  # NONE = allow, GUARDRAIL_INTERVENED = block
  blocked_patterns:
    - "password"
    - "credit.card"
    - "ssn"
    - "social.security"
