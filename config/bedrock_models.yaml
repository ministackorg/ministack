# MiniStack Bedrock — Model mapping configuration
# Maps AWS Bedrock model IDs to local models served via Ollama/LiteLLM.
#
# Usage:
#   - Models listed here are exposed by list_inference_profiles()
#   - converse() maps the requested modelId to the local model before calling LiteLLM
#   - If a modelId is not found, "default_model" is used

models:
  # Anthropic Claude
  "anthropic.claude-opus-4-6-v1:0": "qwen3.5:4b"
  "anthropic.claude-opus-4-5-20251101-v1:0": "qwen3.5:2b"
  "anthropic.claude-3-sonnet-20240229-v1:0": "qwen3.5:0.8b" # Smaller image. Use for rapid prototyping and testing.
  "anthropic.claude-3-haiku-20240307-v1:0": "qwen2.5:1.5b"
  "anthropic.claude-3-5-sonnet-20241022-v2:0": "qwen2.5:3b"
  "anthropic.claude-v2": "qwen2.5:3b"
  "eu.anthropic.claude-sonnet-4-6": "qwen2.5:3b"
  "us.anthropic.claude-sonnet-4-6": "qwen2.5:3b"
  "eu.anthropic.claude-sonnet-4-20250514-v1:0": "qwen2.5:3b"
  "us.anthropic.claude-sonnet-4-20250514-v1:0": "qwen2.5:3b"

  # Amazon Titan
  "amazon.titan-text-express-v1": "qwen2.5:1.5b"
  "amazon.titan-text-lite-v1": "qwen2.5:1.5b"
  "amazon.titan-embed-text-v1": "nomic-embed-text"
  "amazon.titan-embed-text-v2:0": "nomic-embed-text"

  # Meta Llama
  "meta.llama3-8b-instruct-v1:0": "llama3.2:3b"
  "meta.llama3-70b-instruct-v1:0": "qwen2.5:3b"
  "meta.llama3-1-8b-instruct-v1:0": "llama3.2:3b"

  # Mistral
  "mistral.mistral-7b-instruct-v0:2": "qwen2.5:3b"
  "mistral.mixtral-8x7b-instruct-v0:1": "qwen2.5:3b"

# Embedding model used for Knowledge Base ingestion & retrieval
embedding_model: "nomic-embed-text"

# Default model for converse() when model ID is not in mapping
default_model: "qwen2.5:3b"

# Guardrail configuration
guardrails:
  default_action: "NONE"  # NONE = allow, GUARDRAIL_INTERVENED = block
  blocked_patterns:
    - "password"
    - "credit.card"
    - "ssn"
    - "social.security"
