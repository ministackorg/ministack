name: Docker Publish

on:
  push:
    tags:
      - "v*.*.*"

env:
  DOCKERHUB_IMAGE: nahuelnucera/ministack
  DOCKERHUB_IMAGE_ORG: ministackorg/ministack
  # Free-to-pull mirror on the GitHub Container Registry. Repo-scoped under
  # the same org as Docker Hub so `ghcr.io/ministackorg/ministack:<tag>` is a
  # drop-in pull. Anonymous pulls are free; rate limits are per-IP and much
  # higher than Docker Hub's, which is the reason this mirror exists.
  GHCR_IMAGE: ghcr.io/ministackorg/ministack

jobs:
  publish:
    runs-on: ubuntu-latest
    # `packages: write` lets GITHUB_TOKEN push to ghcr.io for this repo's
    # org-scoped package; `contents: read` is the standard default kept
    # explicit since we now set permissions at the job level.
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU (multi-arch)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Regular (Alpine) image — :latest, :{version}, :{major}.{minor} ──
      - name: Extract metadata (regular)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE_ORG }}
            ${{ env.GHCR_IMAGE }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push (regular)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            MINISTACK_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=regular
          cache-to: type=gha,mode=max,scope=regular

      # ── Full (Debian/glibc) image — :full, :{version}-full, :{major}.{minor}-full ──
      # Adds DuckDB (Athena engine), psycopg2-binary, pymysql. Larger
      # image (~360 MB vs ~110 MB) but all manylinux wheels install
      # cleanly. Tracks the same release cadence as regular until
      # issue #411 has a longer-term answer.
      - name: Extract metadata (full)
        id: meta_full
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.DOCKERHUB_IMAGE }}
            ${{ env.DOCKERHUB_IMAGE_ORG }}
            ${{ env.GHCR_IMAGE }}
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}},suffix=-full
            type=semver,pattern={{major}}.{{minor}},suffix=-full
            type=raw,value=full

      - name: Build and push (full)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.full
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta_full.outputs.tags }}
          labels: ${{ steps.meta_full.outputs.labels }}
          build-args: |
            MINISTACK_VERSION=${{ steps.meta.outputs.version }}
          cache-from: type=gha,scope=full
          cache-to: type=gha,mode=max,scope=full
