name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - mode: parallel
            shard_index: 0
            shard_count: 4
          - mode: parallel
            shard_index: 1
            shard_count: 4
          - mode: parallel
            shard_index: 2
            shard_count: 4
          - mode: parallel
            shard_index: 3
            shard_count: 4
          - mode: serial
            shard_index: 0
            shard_count: 1

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping" --health-interval 5s --health-timeout 3s --health-retries 5


    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -e . && pip install -r requirements.txt boto3 pytest pytest-xdist duckdb docker cbor2 pyyaml cryptography

      - name: Start MiniStack
        run: |
          REDIS_HOST=localhost python -m hypercorn ministack.app:app --bind 0.0.0.0:4566 --keep-alive 75 > ministack.log 2>&1 &
          sleep 3
          curl -sf http://localhost:4566/_ministack/health

      - name: Select tests for shard
        id: select
        run: |
          FILES=$(python3 scripts/select_test_shard.py \
            --shard-index ${{ matrix.shard_index }} \
            --shard-count ${{ matrix.shard_count }} \
            --mode ${{ matrix.mode }})
          echo "files=$FILES" >> "$GITHUB_OUTPUT"

      - name: Run tests for shard
        run: |
          if [ -z "${{ steps.select.outputs.files }}" ]; then
            echo "No tests selected for this shard"
            exit 0
          fi
          if [ "${{ matrix.mode }}" = "serial" ]; then
            pytest ${{ steps.select.outputs.files }} -v --tb=short -m "serial" --durations=10
          else
            pytest ${{ steps.select.outputs.files }} -v -n 3 --dist=loadfile -m "not serial" --durations=25
          fi

      - name: Upload MiniStack log
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ministack-${{ matrix.mode }}-shard-${{ matrix.shard_index }}.log
          path: ministack.log
