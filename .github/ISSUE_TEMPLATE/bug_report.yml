name: Bug Report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out the details below.

  - type: dropdown
    id: service
    attributes:
      label: Affected Service
      options:
        - Account
        - ACM
        - API Gateway (v1)
        - API Gateway (v2)
        - AppConfig
        - AppSync
        - AppSync Events
        - Athena
        - Auto Scaling
        - Backup
        - Batch
        - CloudFormation
        - CloudFront
        - CloudFront KeyValueStore
        - CloudTrail
        - CloudWatch
        - CloudWatch Logs
        - CodeBuild
        - Cognito
        - DynamoDB
        - DynamoDB Streams
        - EC2
        - ECR
        - ECS
        - EFS
        - EKS
        - ElastiCache
        - ELB / ALB
        - EMR
        - EventBridge
        - EventBridge Pipes
        - EventBridge Scheduler
        - Firehose
        - Glue
        - IAM
        - IMDS
        - Kinesis
        - KMS
        - Lambda
        - OpenSearch
        - Organizations
        - RDS
        - RDS Data
        - Resource Groups Tagging API
        - Route53
        - S3
        - Secrets Manager
        - Service Discovery / Cloud Map
        - SES (v1)
        - SES v2
        - SNS
        - SQS
        - SSM
        - Step Functions
        - STS
        - Transfer Family
        - WAF Classic
        - WAFv2
        - Router / General
        - Other (specify in description)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Describe the bug clearly.
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
      description: Minimal code or CLI commands to reproduce.
      render: python
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: MiniStack version
      placeholder: "e.g. v0.1.0 or latest"
    validations:
      required: true

  - type: input
    id: sdk
    attributes:
      label: SDK / tool used
      placeholder: "e.g. boto3 1.34, AWS CLI 2.15, Terraform 1.7"
